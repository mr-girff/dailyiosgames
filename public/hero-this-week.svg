<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="New iOS games this week" width="1200" height="630">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff1e6"/>
      <stop offset="1" stop-color="#ffd3b8"/>
    </linearGradient>
    <linearGradient id="cal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fde0d0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg6)"/>
  <g transform="translate(740,140)">
    <rect x="0" y="20" width="380" height="380" rx="32" fill="url(#cal)" stroke="#d97a4f" stroke-width="3"/>
    <rect x="0" y="20" width="380" height="70" rx="32" fill="#c15f3c"/>
    <text x="190" y="68" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="28" fill="#fff">THIS WEEK</text>
    <g fill="#7a4530" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600">
      <text x="50" y="135" text-anchor="middle">M</text>
      <text x="100" y="135" text-anchor="middle">T</text>
      <text x="150" y="135" text-anchor="middle">W</text>
      <text x="200" y="135" text-anchor="middle">T</text>
      <text x="250" y="135" text-anchor="middle">F</text>
      <text x="300" y="135" text-anchor="middle">S</text>
      <text x="350" y="135" text-anchor="middle">S</text>
    </g>
    <g>
      <circle cx="50"  cy="180" r="18" fill="#f0a07b" opacity=".4"/>
      <circle cx="100" cy="180" r="18" fill="#f0a07b" opacity=".55"/>
      <circle cx="150" cy="180" r="18" fill="#f0a07b" opacity=".7"/>
      <circle cx="200" cy="180" r="18" fill="#f0a07b" opacity=".85"/>
      <circle cx="250" cy="180" r="22" fill="#c15f3c"/>
      <circle cx="300" cy="180" r="18" fill="#f0a07b" opacity=".55"/>
      <circle cx="350" cy="180" r="18" fill="#f0a07b" opacity=".4"/>
    </g>
    <g fill="#7a4530" font-family="Inter, system-ui, sans-serif" font-size="18">
      <text x="50"  y="186" text-anchor="middle">3</text>
      <text x="100" y="186" text-anchor="middle">5</text>
      <text x="150" y="186" text-anchor="middle">8</text>
      <text x="200" y="186" text-anchor="middle">12</text>
      <text x="250" y="187" text-anchor="middle" fill="#fff" font-weight="800">29</text>
      <text x="300" y="186" text-anchor="middle">7</text>
      <text x="350" y="186" text-anchor="middle">4</text>
    </g>
    <text x="190" y="290" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="22" fill="#c15f3c">68 new releases</text>
    <text x="190" y="320" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#7a4530">past 7 days</text>
  </g>
  <text x="80" y="280" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="58" fill="#5a2a18">New iOS Games</text>
  <text x="80" y="350" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="58" fill="#c15f3c">This Week</text>
  <text x="80" y="400" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#7a4530">Every US App Store launch from the past 7 days, ranked by traction.</text>
</svg>
