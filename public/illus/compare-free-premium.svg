<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="640" height="420" viewBox="0 0 640 420" role="img" aria-label="Free versus premium iOS games">
  <title>Free versus premium iOS games</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7f0"/><stop offset="1" stop-color="#f7d9c4"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity=".16"/>
    </filter>
  </defs>
  <rect width="640" height="420" fill="url(#bg)"/>
  <g font-family="-apple-system, Segoe UI, sans-serif" font-weight="800" text-anchor="middle">
    <g filter="url(#sh)">
      <rect x="46" y="120" width="230" height="180" rx="20" fill="#c15f3c"/>
      <rect x="364" y="120" width="230" height="180" rx="20" fill="#2f7d6b"/>
    </g>
    <text x="161" y="222" font-size="34" fill="#fff">Free</text>
    <text x="479" y="222" font-size="34" fill="#fff">Premium</text>
    <circle cx="320" cy="210" r="42" fill="#fffdf8" stroke="#e0d6c2" stroke-width="3"/>
    <text x="320" y="223" font-size="26" fill="#8a3f23" font-style="italic">vs</text>
    <text x="320" y="70" font-size="22" fill="#8a3f23">iOS Game Face-Off</text>
    <text x="320" y="358" font-size="17" font-weight="600" fill="#a8401f">Daily iOS Games · ios.querygame.com</text>
  </g>
</svg>
