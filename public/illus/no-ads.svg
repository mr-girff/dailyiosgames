<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="640" height="420" viewBox="0 0 640 420" role="img" aria-label="A phone screen showing a game with the ad banner crossed out">
  <title>iOS games with no ads — illustration</title>
  <desc>An iPhone displaying a clean game UI while a faded ad banner is crossed out beside it, representing ad-free iOS gaming.</desc>
  <defs>
    <linearGradient id="naBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff5ee"/>
      <stop offset="1" stop-color="#f9dec7"/>
    </linearGradient>
    <linearGradient id="naPhone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b1a12"/>
      <stop offset="1" stop-color="#3a261b"/>
    </linearGradient>
    <linearGradient id="naScreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fde0d0"/>
      <stop offset="1" stop-color="#f5b893"/>
    </linearGradient>
    <radialGradient id="naGlow" cx=".7" cy=".3" r=".7">
      <stop offset="0" stop-color="#ffd3b8" stop-opacity=".8"/>
      <stop offset="1" stop-color="#ffd3b8" stop-opacity="0"/>
    </radialGradient>
    <filter id="naShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity=".18"/>
    </filter>
  </defs>
  <rect width="640" height="420" fill="url(#naBg)"/>
  <circle cx="500" cy="120" r="180" fill="url(#naGlow)"/>

  <!-- crossed-out ad banner -->
  <g opacity=".55" transform="translate(60,80)">
    <rect width="200" height="64" rx="14" fill="#fff" stroke="#d97a4f" stroke-width="2" stroke-dasharray="6 4"/>
    <text x="20" y="28" font-family="-apple-system, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#a8401f" letter-spacing="1.5">AD · 0:30</text>
    <text x="20" y="50" font-family="-apple-system, Segoe UI, sans-serif" font-size="11" fill="#6b655c">Install now — limited offer!</text>
    <line x1="-8" y1="-8" x2="210" y2="74" stroke="#a8401f" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- phone -->
  <g filter="url(#naShadow)" transform="translate(330,40)">
    <rect width="200" height="340" rx="34" fill="url(#naPhone)"/>
    <rect x="10" y="12" width="180" height="316" rx="26" fill="url(#naScreen)"/>
    <!-- status bar -->
    <rect x="78" y="20" width="44" height="14" rx="7" fill="#2b1a12"/>
    <!-- game scene: blocks stacking -->
    <g transform="translate(28,80)">
      <rect x="0"  y="60" width="36" height="36" rx="8" fill="#d97a4f"/>
      <rect x="44" y="50" width="36" height="46" rx="8" fill="#c15f3c"/>
      <rect x="88" y="40" width="36" height="56" rx="8" fill="#a8401f"/>
      <rect x="0"  y="110" width="124" height="14" rx="7" fill="#fff"/>
      <rect x="0"  y="132" width="80"  height="10" rx="5" fill="#fff" opacity=".7"/>
    </g>
    <!-- happy face mark -->
    <g transform="translate(140,260)">
      <circle r="14" fill="#fff"/>
      <circle cx="-4" cy="-2" r="2" fill="#2b1a12"/>
      <circle cx="4"  cy="-2" r="2" fill="#2b1a12"/>
      <path d="M-6 4 Q 0 9 6 4" stroke="#2b1a12" stroke-width="2" stroke-linecap="round" fill="none"/>
    </g>
  </g>

  <!-- caption -->
  <g transform="translate(60,310)">
    <rect width="220" height="48" rx="24" fill="#c15f3c"/>
    <text x="22" y="31" font-family="-apple-system, Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#fff">No ads. Just play.</text>
  </g>
</svg>
