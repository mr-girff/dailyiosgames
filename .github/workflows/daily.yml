name: Daily Game Data
on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }

      - name: System deps for video pipeline
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3-pip
          pip3 install --quiet --break-system-packages edge-tts || pip3 install --quiet edge-tts

      - run: npm install --no-audit --no-fund

      - name: Fetch
        run: npm run fetch

      - name: Enrich
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4o-mini
        run: npm run enrich

      - name: Sanity check (guard against empty/broken data)
        run: |
          node -e '
            const fs = require("fs");
            const MIN = 50; // site has been ~130; 50 = generous floor
            const d = JSON.parse(fs.readFileSync("data/enriched.json", "utf8"));
            const n = (d.all || []).length;
            const today = new Date().toISOString().slice(0,10);
            if (n < MIN) {
              console.error(`SANITY FAIL: enriched.json has ${n} games (< ${MIN}). Aborting before commit to protect data + site.`);
              process.exit(1);
            }
            const snap = `data/${today}.json`;
            if (!fs.existsSync(snap)) {
              console.error(`SANITY FAIL: today snapshot ${snap} missing. Fetch likely failed.`);
              process.exit(1);
            }
            console.log(`Sanity OK: ${n} games enriched, snapshot ${snap} present.`);
          '

      - name: Velocity (heat signals from snapshot history)
        run: npm run velocity

      - name: Trends
        run: npm run trends
        continue-on-error: true   # Google Trends frequently blocks cloud IPs; non-fatal

      - name: Images (upload to R2)
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ vars.CF_ACCOUNT_ID }}
          R2_BUCKET: ${{ vars.R2_BUCKET }}
          R2_PUBLIC_BASE: ${{ vars.R2_PUBLIC_BASE }}
        run: npm run images

      - name: Video teasers
        run: npm run video
        continue-on-error: true   # video gen is best-effort; never block deploy

      - name: Sync reader reviews
        env:
          PUBLIC_REVIEWS_WORKER: ${{ vars.PUBLIC_REVIEWS_WORKER }}
        run: npm run reviews

      - name: Commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ public/video/ src/content/posts/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "data: daily refresh $(date -u +%F)"
          # Retry with rebase to survive concurrent pushes
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push origin main && exit 0
            echo "Push attempt $i failed; retrying in 5s..."
            sleep 5
          done
          echo "All push attempts failed."
          exit 1
