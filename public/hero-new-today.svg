<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="New iOS games released today" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff1e6"/>
      <stop offset="1" stop-color="#ffd3b8"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fde4d2"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0a07b"/>
      <stop offset="1" stop-color="#a8401f"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#a8401f" flood-opacity=".18"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g transform="translate(80,140)" filter="url(#sh)">
    <rect x="0" y="0" width="180" height="180" rx="42" fill="url(#card)"/>
    <rect x="220" y="20" width="180" height="180" rx="42" fill="url(#card)"/>
    <rect x="440" y="0" width="180" height="180" rx="42" fill="url(#card)"/>
    <circle cx="90" cy="90" r="38" fill="url(#accent)"/>
    <rect x="60" y="200" width="120" height="14" rx="7" fill="#c15f3c" opacity=".35"/>
    <circle cx="310" cy="110" r="38" fill="url(#accent)"/>
    <rect x="280" y="220" width="120" height="14" rx="7" fill="#c15f3c" opacity=".35"/>
    <circle cx="530" cy="90" r="38" fill="url(#accent)"/>
    <rect x="500" y="200" width="120" height="14" rx="7" fill="#c15f3c" opacity=".35"/>
  </g>
  <g transform="translate(80,420)">
    <rect x="0" y="0" width="220" height="42" rx="21" fill="#c15f3c"/>
    <text x="110" y="28" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="18" fill="#fff">NEW TODAY</text>
  </g>
  <text x="80" y="510" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="56" fill="#5a2a18">New iOS Games Released Today</text>
  <text x="80" y="560" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#7a4530">Every new release on the US App Store — refreshed every morning.</text>
</svg>
