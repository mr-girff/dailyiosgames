<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="640" height="420" viewBox="0 0 640 420" role="img" aria-label="Isometric impossible architecture in warm sunset tones">
  <title>Games like Monument Valley — illustration</title>
  <desc>Warm isometric architecture with impossible-geometry stairs and a small silhouette walking the path, echoing the visual language of art-puzzle iOS games.</desc>
  <defs>
    <linearGradient id="mvBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff5ee"/>
      <stop offset="1" stop-color="#f7c39e"/>
    </linearGradient>
    <linearGradient id="towerLight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fde0d0"/>
      <stop offset="1" stop-color="#f0a07b"/>
    </linearGradient>
    <linearGradient id="towerMid" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0a07b"/>
      <stop offset="1" stop-color="#d97a4f"/>
    </linearGradient>
    <linearGradient id="towerDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d97a4f"/>
      <stop offset="1" stop-color="#a8401f"/>
    </linearGradient>
    <radialGradient id="mvSun" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#ffd3b8"/>
      <stop offset="1" stop-color="#ffd3b8" stop-opacity="0"/>
    </radialGradient>
    <filter id="mvShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity=".18"/>
    </filter>
  </defs>
  <rect width="640" height="420" fill="url(#mvBg)"/>
  <circle cx="500" cy="120" r="180" fill="url(#mvSun)"/>

  <!-- ground plate -->
  <g filter="url(#mvShadow)" transform="translate(160,90)">
    <!-- base diamond -->
    <polygon points="160,260 320,180 160,100 0,180" fill="url(#towerMid)"/>
    <polygon points="160,260 320,180 320,200 160,280" fill="url(#towerDark)"/>
    <polygon points="0,180 160,260 160,280 0,200" fill="#8a3f23"/>

    <!-- tower block 1 -->
    <polygon points="80,140 240,60 240,140 80,220" fill="url(#towerLight)"/>
    <polygon points="80,140 240,60 320,100 160,180" fill="url(#towerMid)"/>
    <polygon points="240,140 320,100 320,180 240,220" fill="url(#towerDark)"/>

    <!-- stair to side -->
    <g transform="translate(50,140)">
      <polygon points="0,0 30,15 30,30 0,15" fill="url(#towerMid)"/>
      <polygon points="0,15 30,30 30,45 0,30" fill="url(#towerDark)"/>
      <polygon points="0,30 30,45 30,60 0,45" fill="url(#towerMid)"/>
      <polygon points="0,45 30,60 30,75 0,60" fill="url(#towerDark)"/>
    </g>

    <!-- impossible bridge floating -->
    <g transform="translate(100,30)">
      <polygon points="0,0 60,-30 120,0 60,30" fill="url(#towerLight)"/>
      <polygon points="0,0 60,30 60,40 0,10" fill="url(#towerMid)"/>
      <polygon points="120,0 60,30 60,40 120,10" fill="url(#towerDark)"/>
    </g>

    <!-- character silhouette on top -->
    <g transform="translate(160,40)">
      <rect x="-3" y="0" width="6" height="14" rx="2" fill="#fffdf8"/>
      <circle cx="0" cy="-4" r="5" fill="#fffdf8"/>
    </g>

    <!-- small flag -->
    <g transform="translate(252,80)">
      <line x1="0" y1="0" x2="0" y2="-22" stroke="#5a2a16" stroke-width="2"/>
      <polygon points="0,-22 14,-18 0,-14" fill="#c15f3c"/>
    </g>
  </g>

  <!-- caption -->
  <g transform="translate(60,340)">
    <rect width="280" height="48" rx="24" fill="#c15f3c"/>
    <text x="22" y="31" font-family="-apple-system, Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#fff">Quiet puzzles, beautiful worlds.</text>
  </g>
</svg>
