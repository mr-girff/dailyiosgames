<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="iOS games like — alternatives finder" width="1200" height="630">
  <defs>
    <linearGradient id="bg7" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff1e6"/>
      <stop offset="1" stop-color="#ffd3b8"/>
    </linearGradient>
    <linearGradient id="card7" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff"/>
      <stop offset="1" stop-color="#fde0d0"/>
    </linearGradient>
    <filter id="sh7"><feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#a8401f" flood-opacity=".22"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg7)"/>
  <!-- Left card (seed) -->
  <g transform="translate(140,180)" filter="url(#sh7)">
    <rect width="220" height="220" rx="48" fill="url(#card7)"/>
    <circle cx="110" cy="110" r="56" fill="#c15f3c"/>
    <text x="110" y="124" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="36" fill="#fff">A</text>
    <text x="110" y="200" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="18" fill="#5a2a18">Game You Love</text>
  </g>
  <!-- Arrow -->
  <g transform="translate(420,290)">
    <path d="M0,0 L80,0 M80,0 L60,-20 M80,0 L60,20" stroke="#c15f3c" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  <!-- Right cards (recommendations) -->
  <g transform="translate(560,140)" filter="url(#sh7)">
    <rect width="160" height="160" rx="36" fill="url(#card7)"/>
    <circle cx="80" cy="80" r="40" fill="#f0a07b"/>
  </g>
  <g transform="translate(750,180)" filter="url(#sh7)">
    <rect width="160" height="160" rx="36" fill="url(#card7)"/>
    <circle cx="80" cy="80" r="40" fill="#d97a4f"/>
  </g>
  <g transform="translate(940,140)" filter="url(#sh7)">
    <rect width="160" height="160" rx="36" fill="url(#card7)"/>
    <circle cx="80" cy="80" r="40" fill="#a8401f"/>
  </g>
  <g transform="translate(650,330)" filter="url(#sh7)">
    <rect width="160" height="160" rx="36" fill="url(#card7)"/>
    <circle cx="80" cy="80" r="40" fill="#ffb98a"/>
  </g>
  <g transform="translate(850,360)" filter="url(#sh7)">
    <rect width="160" height="160" rx="36" fill="url(#card7)"/>
    <circle cx="80" cy="80" r="40" fill="#f4c948"/>
  </g>
  <text x="80" y="80" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="40" fill="#5a2a18">iOS games like →</text>
  <text x="80" y="540" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#7a4530">Data-driven alternatives. Tag overlap, archetype match, currently available on the US App Store.</text>
</svg>
